<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNO Online</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M20 0 H50 V50 H0 V20 Q0 0 20 0 Z' fill='%23EE3233'/%3E%3Cpath d='M50 0 H80 Q100 0 100 20 V50 H50 Z' fill='%230096E0'/%3E%3Cpath d='M0 50 H50 V100 H20 Q0 100 0 80 Z' fill='%23FFD900'/%3E%3Cpath d='M50 50 H100 V80 Q100 100 80 100 H50 Z' fill='%2355AA55'/%3E%3Cellipse cx='50' cy='50' rx='38' ry='24' fill='white' transform='rotate(-20 50 50)'/%3E%3Ctext x='50' y='58' font-family='Arial, sans-serif' font-size='24' font-weight='900' fill='black' text-anchor='middle' transform='rotate(-20 50 50)'%3EUNO%3C/text%3E%3C/svg%3E">
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --red: #EE3233;
            --blue: #0096E0;
            --yellow: #FFD900;
            --green: #55AA55;
            --black: #333333;
            --glass-bg: rgba(40, 40, 40, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --radius: 12px;
            --card-w: 100px;
            --card-h: 150px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { 
            background-color: #0d0d0d;
            background-image: 
                radial-gradient(circle at center, rgba(60, 60, 60, 0.9) 0%, rgba(5, 5, 5, 1) 100%),
                radial-gradient(circle, rgba(255, 255, 255, 1) 1.5px, transparent 1px);
            background-size: 100% 100%, 30px 30px;
            background-position: 0 0, 0 0;
            color: var(--text-color); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; 
            width: 100vw;
            height: 100vh;
            margin: 0;
        }
        
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        
        .glass-no-shadow {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
        }

        /* Common UI */
        button {
            background: rgba(255, 255, 255, 0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 20px; border-radius: var(--radius); cursor: pointer; font-size: 16px;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1); outline: none;
        }
        button:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.05); }
        button:active { transform: scale(0.95); }
        button.primary { background: var(--red); border-color: var(--red); font-weight: bold; }
        button.primary:hover { background: #ff4747; }
        button:disabled { opacity: 0.5; pointer-events: none; }
        
        input[type="text"], input[type="number"] {
            background: rgba(0,0,0,0.5); color: #fff; border: 1px solid rgba(255,255,255,0.2);
            padding: 10px; border-radius: var(--radius); font-size: 16px; outline: none; width: 100%;
        }
        input:focus { border-color: var(--blue); }

        /* Toggle Switch */
        .toggle-switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.1); transition: .4s; border-radius: 26px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--green); }
        input:checked + .slider:before { transform: translateX(24px); }

        /* Views */
        .view { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .view.active { display: flex; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        /* Home View */
        #home-view .cards-hero { display: flex; justify-content: center; gap: -20px; margin-bottom: 40px; }
        #home-view .cards-hero .card { position: relative; margin: 0 -15px; transform-origin: bottom center; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #home-view .cards-hero .card:nth-child(1) { transform: rotate(-15deg); }
        #home-view .cards-hero .card:nth-child(2) { transform: rotate(-5deg) translateY(-10px); }
        #home-view .cards-hero .card:nth-child(3) { transform: rotate(5deg) translateY(-10px); }
        #home-view .cards-hero .card:nth-child(4) { transform: rotate(15deg); }
        #home-view .cards-hero .card:hover { transform: translateY(-30px) scale(1.1) rotate(0deg); z-index: 10; }
        
        #home-view h1 { font-size: 48px; margin-bottom: 40px; font-weight: 900; letter-spacing: 2px; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .home-btns { display: flex; flex-direction: column; gap: 15px; width: 200px; }
        .footer { position: absolute; bottom: 20px; font-size: 12px; color: rgba(255,255,255,0.4); cursor: default; }

        /* Cards */
        .card {
            width: var(--card-w); height: var(--card-h); border-radius: 8px; border: 4px solid white;
            background-color: var(--black); display: flex; align-items: center; justify-content: center;
            position: relative; box-shadow: 0 4px 8px rgba(0,0,0,0.3); font-weight: bold; font-size: 40px;
        }
        .card.red { background-color: var(--red); color: var(--red); }
        .card.blue { background-color: var(--blue); color: var(--blue); }
        .card.yellow { background-color: var(--yellow); color: var(--yellow); }
        .card.green { background-color: var(--green); color: var(--green); }
        .card.black { background-color: var(--black); color: var(--black); }
        .card::before { 
            content: ''; 
            position: absolute; 
            top: 12px; left: 8px; right: 8px; bottom: 12px; 
            background: white; 
            border-radius: 50%; 
            transform: rotate(-25deg); 
            z-index: 0;
        }
        .card.card-back::before { display: none; }
        
        .card-icon { width: 50px; height: 50px; z-index: 1; }

        .card-back { background: var(--black); background-image: radial-gradient(circle, rgba(238,50,51,0.8) 10%, transparent 10%), radial-gradient(circle, rgba(0,150,224,0.8) 10%, transparent 10%); background-size: 20px 20px; background-position: 0 0, 10px 10px; }
        .card-back::after { content: 'UNO'; position: absolute; font-size: 30px; color: var(--yellow); transform: rotate(-25deg); text-shadow: 2px 2px 0 red; font-weight: 900; }

        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 100; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { padding: 30px; width: 320px; display: flex; flex-direction: column; gap: 20px; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal-header { font-size: 24px; font-weight: bold; text-align: center; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-row { display: flex; justify-content: space-between; align-items: center; }
        .number-picker { display: flex; align-items: center; gap: 10px; }
        .number-picker button { padding: 5px 10px; min-width: 36px; }

        /* Lobby View */
        #lobby-view .header { 
            position: absolute; 
            top: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 15px 40px; 
            gap: 40px;
            border-radius: 50px;
        }
        .player-list { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 20px; 
            width: 80%; 
            max-width: 800px; 
            margin-top: 100px; 
            max-height: 60vh; 
            overflow-y: auto; 
        }
        .player-item { width: 200px; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; height: 120px; text-align: center; flex-shrink: 0; }
        .player-item.me { border-color: var(--blue); }
        .player-item.empty { border-style: dashed; opacity: 0.5; justify-content: center; }
        .player-item .kick-btn { background: rgba(238,50,51,0.2); color: var(--red); border: none; padding: 5px 10px; font-size: 12px; margin-top: 5px; }
        .player-item .kick-btn:hover { background: var(--red); color: white; }
        .player-status-text { transition: color 0.3s ease, transform 0.3s ease; display: inline-block; }
        
        .lobby-bottom { position: absolute; bottom: 40px; display: flex; gap: 20px; }
        
        #btn-ready {
            width: 120px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* Game View */
        #game-view { justify-content: space-between; padding: 20px; }
        .game-header-row { display: flex; justify-content: center; gap: 20px; width: 100%; margin-top: 10px; margin-bottom: 20px; z-index: 10; }
        .game-pill { padding: 10px 25px; border-radius: 50px; font-size: 16px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .game-pill.active { box-shadow: 0 0 15px var(--yellow); animation: pulse 1.5s infinite; border-color: var(--yellow); color: var(--yellow); }
        #turn-indicator { width: 280px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-leave-game { position: absolute; top: 30px; left: 30px; border-radius: 50px; z-index: 20; padding: 10px 20px; }
        
        @keyframes pulse { 0% { box-shadow: 0 0 10px var(--yellow); } 50% { box-shadow: 0 0 25px var(--yellow); } 100% { box-shadow: 0 0 10px var(--yellow); } }
        
        .game-players-row { display: flex; justify-content: center; gap: 15px; width: 100%; padding: 20px 40px; margin-bottom: 20px; overflow-x: auto; scroll-behavior: smooth; }
        .game-player-card { 
            display: flex; flex-direction: column; align-items: center; justify-content: space-between; 
            padding: 10px 15px; width: auto; min-width: 120px; max-width: 200px; height: 120px; border-radius: var(--radius);
            transition: all 0.3s ease; flex-shrink: 0;
            background: rgba(40, 40, 40, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            opacity: 0.6; /* Inactive opacity */
        }
        .game-player-card.active-turn { opacity: 1; transform: translateY(-10px) scale(1.05); box-shadow: 0 10px 20px rgba(0,0,0,0.5); border-color: var(--yellow); }
        .game-player-card.me { border-color: var(--blue); opacity: 1; }
        
        .gpc-name { font-size: 12px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; text-align: center; }
        .gpc-tag { font-size: 10px; padding: 2px 6px; border-radius: 10px; background: rgba(255,255,255,0.1); margin-bottom: 5px; }
        
        .gpc-hand { position: relative; height: 60px; width: 100%; display: flex; justify-content: center; }
        .gpc-card-back { 
            position: absolute; width: 40px; height: 60px; border-radius: 4px; 
            border: 1px solid rgba(255,255,255,0.8); box-shadow: -2px 0 5px rgba(0,0,0,0.5); 
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            background: var(--black); 
            background-image: radial-gradient(circle, rgba(238,50,51,0.8) 10%, transparent 10%), radial-gradient(circle, rgba(0,150,224,0.8) 10%, transparent 10%); 
            background-size: 10px 10px; background-position: 0 0, 5px 5px;
            opacity: 1 !important;
        }
        .gpc-card-back::after { content: 'UNO'; font-size: 10px; color: var(--yellow); transform: rotate(-25deg); font-weight: 900; }


        .game-center { flex: 1; display: flex; justify-content: center; align-items: center; gap: 300px; width: 100%; position: relative; }
        .deck-area { position: relative; width: var(--card-w); height: var(--card-h); cursor: pointer; }
        .deck-card { position: absolute; top: 0; left: 0; transition: transform 0.2s; }
        /* Make deck messy */
        .deck-card:nth-child(1) { transform: rotate(-15deg) translate(-8px, -12px); }
        .deck-card:nth-child(2) { transform: rotate(23deg) translate(12px, 8px); }
        .deck-card:nth-child(3) { transform: rotate(-32deg) translate(-14px, 5px); }
        .deck-card:nth-child(4) { transform: rotate(18deg) translate(15px, -15px); }
        .deck-card:nth-child(5) { transform: rotate(-8deg) translate(5px, -8px); }
        .deck-card:nth-child(6) { transform: rotate(40deg) translate(-10px, 15px); }
        .deck-card:nth-child(7) { transform: rotate(-45deg) translate(20px, 5px); }
        .deck-card:nth-child(8) { transform: rotate(0deg) translate(0, 0); }
        .deck-area:hover .deck-card:last-child { transform: translateY(-15px) rotate(0deg); }
        
        .discard-area { position: relative; width: var(--card-w); height: var(--card-h); }
        .discard-card { position: absolute; top: 0; left: 0; box-shadow: none !important; }
        
        .guide-text { 
            position: absolute; bottom: -100px; left: 50%; transform: translateX(-50%); 
            font-size: 14px; font-weight: bold; color: var(--yellow); white-space: nowrap; 
            animation: bounce 1s infinite; pointer-events: none; 
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--yellow);
            padding: 5px 12px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .guide-text.show { opacity: 1; }
        @keyframes bounce { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -5px); } }

        .game-bottom { position: relative; width: 100%; height: var(--card-h); display: flex; justify-content: center; align-items: flex-end; padding-bottom: 20px; margin-bottom: 20px; }
        .my-hand { display: flex; justify-content: center; position: relative; height: var(--card-h); width: 80%; }
        .hand-card { 
            position: absolute; 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), left 0.3s ease; 
            cursor: pointer; 
            transform-origin: bottom center; 
        }
        .hand-card:hover { transform: translateY(-30px) !important; z-index: 100 !important; }
        
        .action-btn-container { position: absolute; left: 50%; transform: translateX(-50%); bottom: calc(var(--card-h) + 100px); width: 120px; height: 50px; z-index: 50; }
        .action-btn { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: none; font-size: 18px; font-weight: bold; z-index: 10; white-space: nowrap; }
        .action-btn.show { display: block; animation: popIn 0.3s; }

        /* QTE */
        #qte-modal .modal-content { text-align: center; }
        #qte-word-display { font-size: 32px; font-weight: bold; color: var(--yellow); letter-spacing: 4px; margin: 10px 0; }
        #qte-input-wrapper { display: flex; align-items: center; font-size: 24px; gap: 10px; justify-content: center; }
        #qte-input { width: 100px; font-size: 24px; text-align: center; letter-spacing: 2px; }

        /* Result View Redesign */
        .result-container { width: 90%; max-width: 500px; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .result-title { font-size: 32px; font-weight: 900; margin-bottom: 20px; color: white; letter-spacing: 2px; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .winner-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .crown { font-size: 60px; line-height: 1; margin-bottom: 10px; animation: crownGlow 2s infinite ease-in-out; }
        .winner-name { font-size: 28px; font-weight: bold; color: var(--yellow); text-shadow: 0 0 15px rgba(255, 215, 0, 0.5); text-align: center; word-break: break-all; }
        .winner-subtitle { font-size: 14px; opacity: 0.7; margin-top: 5px; }
        .leaderboard { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; max-height: 40vh; overflow-y: auto; padding-right: 5px; }
        .lb-row { display: flex; align-items: center; background: rgba(0,0,0,0.3); padding: 12px 20px; border-radius: 8px; transition: background 0.2s; }
        .lb-row:hover { background: rgba(255,255,255,0.1); }
        .lb-rank { font-size: 18px; font-weight: bold; width: 30px; color: rgba(255,255,255,0.5); }
        .lb-row:nth-child(1) .lb-rank { color: #C0C0C0; } /* 2nd place */
        .lb-row:nth-child(2) .lb-rank { color: #CD7F32; } /* 3rd place */
        .lb-name { flex: 1; font-size: 16px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 10px; }
        .lb-cards { font-size: 16px; color: var(--red); font-weight: bold; }
        .result-actions { display: flex; gap: 20px; width: 100%; justify-content: center; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes crownGlow { 0%, 100% { filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.8)); } 50% { filter: drop-shadow(0 0 25px rgba(255, 215, 0, 1)) drop-shadow(0 0 50px rgba(255, 255, 255, 0.5)); transform: scale(1.1); } }
        @keyframes starlight { 0% { opacity: 0; transform: scale(0) rotate(0deg); } 50% { opacity: 1; transform: scale(1) rotate(180deg); } 100% { opacity: 0; transform: scale(0) rotate(360deg); } }
        @keyframes crownFly { 0% { transform: scale(1); top: 50%; left: 50%; } 100% { transform: scale(0.75); } }

        .star { position: absolute; font-size: 24px; color: white; pointer-events: none; animation: starlight 1.5s linear forwards; z-index: 10000; text-shadow: 0 0 10px rgba(255,255,255,0.8); }

        /* Debug HUD */
        #debug-hud { position: fixed; bottom: 10px; left: 10px; padding: 10px; font-size: 10px; font-family: monospace; color: rgba(255,255,255,0.7); z-index: 1000; pointer-events: none; width: 200px; }
        #debug-hud p { margin: 2px 0; }

        /* Chat Widget */
        #chat-widget { position: fixed; right: -320px; bottom: 30px; width: 300px; height: 400px; z-index: 90; transition: right 0.3s ease; display: none; flex-direction: column; padding: 15px; }
        #chat-widget.open { right: 30px; }
        #chat-toggle-btn { position: absolute; left: -90px; bottom: 0; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 0; background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); color: white; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); font-size: 24px; }
        .chat-badge { position: absolute; top: -5px; right: -5px; width: 16px; height: 16px; background: var(--red); border-radius: 50%; border: 2px solid #333; display: none; }
        .chat-badge.show { display: block; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; padding-right: 5px; font-size: 14px; }
        .chat-msg { max-width: 80%; padding: 8px 12px; border-radius: 12px; word-break: break-all; }
        .chat-msg.others { align-self: flex-start; background: rgba(255,255,255,0.1); border-bottom-left-radius: 2px; }
        .chat-msg.me { align-self: flex-end; background: var(--blue); border-bottom-right-radius: 2px; }
        .chat-sender { font-size: 10px; opacity: 0.6; margin-bottom: 2px; }
        .chat-input-area { display: flex; gap: 5px; width: 100%; }
        .chat-input-area input { flex: 1; padding: 8px; font-size: 14px; border-radius: 20px; min-width: 0; }
        .chat-input-area button { flex-shrink: 0; padding: 8px 15px; border-radius: 20px; white-space: nowrap; }

        /* Color Picker Modal */
        .color-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .color-btn { height: 80px; border-radius: var(--radius); border: 4px solid transparent; cursor: pointer; transition: transform 0.2s; }
        .color-btn:hover { transform: scale(1.05); border-color: white; }
        .color-btn.red { background-color: var(--red); }
        .color-btn.blue { background-color: var(--blue); }
        .color-btn.yellow { background-color: var(--yellow); }
        .color-btn.green { background-color: var(--green); }

        /* Animations */
        .anim-card { position: fixed; z-index: 1000; transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), left 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), top 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.2s ease-out; pointer-events: none; }
        .anim-card-inner { position: absolute; top: 0; left: 0; transform-origin: top left; transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .anim-card .card { width: 100% !important; height: 100% !important; margin: 0 !important; }
        
        /* Toast */
        #toast-container { position: fixed; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 2000; pointer-events: none; align-items: flex-end; }
        .toast { padding: 12px 24px; color: white; border-radius: 8px; font-size: 14px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); animation: slideInRight 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), fadeOut 0.3s 2.7s forwards; }
        .toast.error { background: rgba(238, 50, 51, 0.9); }
        .toast.info { background: rgba(0, 150, 224, 0.9); }
        .toast.success { background: rgba(85, 170, 85, 0.9); }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateX(20px); } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            :root {
                --card-w: 60px;
                --card-h: 90px;
                --radius: 8px;
            }
            #debug-hud { display: none; } /* Hide debug hud on small screens to prevent overlap */
            #chat-widget { width: 250px; height: 300px; right: -250px; bottom: 60px; }
            #chat-widget.open { right: 20px; }
            #chat-toggle-btn { width: 40px; height: 40px; bottom: 30px; left: -60px; font-size: 20px; }
            
            .cards-hero { transform: scale(0.8); margin-bottom: 20px; }
            h1 { font-size: 32px !important; margin-bottom: 20px !important; }
            .footer { bottom: 40px; } /* Lift footer on mobile to avoid bottom home bars */
            
            /* Game UI Mobile Adjustments */
            .btn-leave-game { top: 40px; left: 15px; padding: 8px 14px; font-size: 12px; }
            .game-header-row { margin-top: 60px; gap: 5px; margin-bottom: 10px; }
            .game-pill { padding: 6px 12px; font-size: 12px; gap: 4px; border-radius: 20px; white-space: nowrap; }
            #turn-indicator { width: auto; max-width: 40vw; }
            #direction-indicator { font-size: 10px; padding: 6px 10px; }
            
            .game-players-row { padding: 15px 10px 5px 10px; gap: 8px; margin-bottom: 10px; }
            .game-player-card { width: auto; min-width: 80px; max-width: 140px; height: 85px; padding: 6px; }
            .gpc-hand { height: 40px; margin-top: auto; }
            .gpc-card-back { width: 25px; height: 40px; background-size: 6px 6px; border-radius: 3px; }
            .gpc-card-back::after { font-size: 8px; }
            
            .game-center { gap: 60px; margin-top: -10px; }
            .card { border-width: 2px; font-size: 24px; }
            .card::before { top: 6px; left: 4px; right: 4px; bottom: 6px; }
            .card-icon { width: 30px; height: 30px; }
            .card-back::after { font-size: 18px; }
            .guide-text { bottom: -80px; font-size: 12px; padding: 4px 8px; }
            
            .game-bottom { margin-bottom: 10px; padding-bottom: 10px; }
            .action-btn-container { bottom: calc(var(--card-h) + 40px); width: 100px; height: 40px; }
            .action-btn { font-size: 14px; }
            
            /* Lobby Adjustments for Mobile */
            #lobby-view .header { 
                padding: 10px 20px; 
                gap: 15px; 
                width: 95%; 
                justify-content: space-around; 
            }
            #lobby-view .header button {
                padding: 8px 12px;
                font-size: 14px;
                white-space: nowrap;
            }
            .player-list { 
                width: 95%; 
                gap: 10px; 
                margin-top: 80px; 
                max-height: 65vh;
            }
            .player-item { 
                width: calc(50% - 10px); 
                height: 100px; 
                padding: 10px; 
            }
            .lobby-bottom {
                width: 95%;
                justify-content: center;
                gap: 10px;
                bottom: 40px;
            }
            .lobby-bottom button {
                padding: 10px;
                font-size: 14px;
                flex: 1;
                white-space: nowrap;
            }
        }

    </style>
</head>
<body>

    <!-- Views -->
    <div id="home-view" class="view active">
        <div class="cards-hero">
            <div class="card red"><div style="z-index:1;">U</div></div>
            <div class="card yellow"><div style="z-index:1;">N</div></div>
            <div class="card blue"><div style="z-index:1;">O</div></div>
            <div class="card green"><div style="z-index:1;">!</div></div>
        </div>
        <h1>UNO Online</h1>
        <div class="home-btns">
            <button class="primary" onclick="showModal('create-room-modal')">创建房间</button>
            <button onclick="showModal('join-room-modal')">加入房间</button>
        </div>
        <div class="footer" id="copyright-footer">2025~2026 ©HaoyuHuang All rights reserved.</div>
    </div>

    <div id="lobby-view" class="view">
        <div class="header glass">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 16px;">房间号:</span> 
                <span id="lobby-room-id" style="font-weight: bold; color: var(--yellow); font-size: 24px; line-height: 1;">---</span>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button onclick="copyRoomId()">复制</button>
                <button onclick="copyLink()">分享链接</button>
            </div>
        </div>
        <div class="player-list" id="lobby-players"></div>
        <div class="lobby-bottom">
            <button id="btn-leave" onclick="leaveRoom()">离开房间</button>
            <button id="btn-ready" class="primary" onclick="toggleReady()">准备</button>
            <button id="btn-start" class="primary" style="display: none;" onclick="startGame()">开始游戏</button>
        </div>
    </div>

    <div id="game-view" class="view">
        <button class="btn-leave-game glass" onclick="leaveRoom()">退出游戏</button>
        <div class="game-header-row">
            <div class="game-pill glass">
                <span style="font-size:12px;opacity:0.7;">房间</span>
                <span id="game-room-id" style="color:var(--yellow);">---</span>
            </div>
            <div id="turn-indicator" class="game-pill glass">等待中...</div>
            <div id="direction-indicator" class="game-pill glass">方向: ↻</div>
        </div>
        <div class="game-players-row" id="game-players"></div>
        <div class="game-center">
            <div class="deck-area" id="deck-pile" onclick="drawCard()">
                <div class="card card-back deck-card"></div>
                <div class="card card-back deck-card"></div>
                <div class="card card-back deck-card"></div>
                <div class="card card-back deck-card"></div>
                <div class="card card-back deck-card"></div>
                <div class="card card-back deck-card"></div>
                <div class="card card-back deck-card"></div>
                <div class="card card-back deck-card"></div>
                <div class="guide-text" id="guide-draw">点击上方抽牌</div>
            </div>
            <div class="discard-area" id="discard-pile"></div>
        </div>
        <div class="game-bottom">
            <div class="my-hand" id="my-hand"></div>
            <div class="action-btn-container">
                <button id="btn-skip" class="action-btn" onclick="skipTurn()">跳过</button>
                <button id="btn-urge" class="action-btn primary" onclick="urgeTurn()">催促</button>
            </div>
        </div>
    </div>

    <div id="result-view" class="view">
        <div class="result-container glass">
            <h2 class="result-title">结算</h2>
            <div class="winner-section">
                <div class="crown">👑</div>
                <div class="winner-name" id="winner-name">---</div>
                <div class="winner-subtitle">胜出者</div>
            </div>
            <div class="leaderboard" id="result-leaderboard">
                <!-- leaderboard items inserted here -->
            </div>
            <div class="result-actions">
                <button id="btn-result-leave" onclick="leaveRoom()">离开房间</button>
                <button id="btn-result-continue" class="primary" onclick="returnLobby()" style="display: none;">继续游戏</button>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="create-room-modal" class="modal-overlay">
        <div class="modal-content glass">
            <div class="modal-header">创建房间</div>
            <div class="form-group">
                <label>昵称</label>
                <input type="text" id="create-name">
            </div>
            <div class="form-group">
                <label>总人数</label>
                <div class="number-picker">
                    <button onclick="changeNumber('create-max', -1, 2, 16)">-</button>
                    <input type="number" id="create-max" value="4" readonly style="text-align: center;">
                    <button onclick="changeNumber('create-max', 1, 2, 16)">+</button>
                </div>
            </div>
            <div class="form-group">
                <label>人机数</label>
                <div class="number-picker">
                    <button onclick="changeNumber('create-bots', -1, 0, 15)">-</button>
                    <input type="number" id="create-bots" value="0" readonly style="text-align: center;">
                    <button onclick="changeNumber('create-bots', 1, 0, 15)">+</button>
                </div>
            </div>
            <div class="form-row">
                <label>隐藏房间</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="create-hidden">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="form-row" style="margin-top: 10px;">
                <button onclick="hideModal('create-room-modal')">取消</button>
                <button class="primary" onclick="createRoom()">创建</button>
            </div>
        </div>
    </div>

    <div id="join-room-modal" class="modal-overlay">
        <div class="modal-content glass">
            <div class="modal-header">加入房间</div>
            <div class="form-group">
                <label>昵称</label>
                <input type="text" id="join-name">
            </div>
            <div class="form-group">
                <label>房间号</label>
                <input type="text" id="join-room-input" placeholder="输入3位数房间号" maxlength="3">
            </div>
            <div class="form-group">
                <label>公开大厅列表</label>
                <div id="public-rooms-list" style="max-height: 150px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 8px; padding: 10px; border: 1px solid rgba(255,255,255,0.1);">
                    <div style="text-align:center; color:rgba(255,255,255,0.5); font-size:14px;">正在加载...</div>
                </div>
            </div>
            <div class="form-row" style="margin-top: 10px;">
                <button onclick="hideModal('join-room-modal')">取消</button>
                <button class="primary" onclick="joinRoom()">加入</button>
            </div>
        </div>
    </div>

    <div id="color-picker-modal" class="modal-overlay" onclick="if(event.target === this) cancelColorPicker()">
        <div class="modal-content glass" style="width: 260px;">
            <div class="modal-header">选择颜色</div>
            <div class="color-grid">
                <div class="color-btn red" onclick="submitColor('red')"></div>
                <div class="color-btn blue" onclick="submitColor('blue')"></div>
                <div class="color-btn yellow" onclick="submitColor('yellow')"></div>
                <div class="color-btn green" onclick="submitColor('green')"></div>
            </div>
        </div>
    </div>

    <div id="qte-modal" class="modal-overlay">
        <div class="modal-content glass">
            <div class="modal-header" style="color: var(--red);">冠军争夺战！</div>
            <div>有人手牌清空！请输入以下抢答码：</div>
            <div id="qte-word-display">UNO-???</div>
            <div id="qte-input-wrapper">
                <span>UNO -</span>
                <input type="text" id="qte-input" maxlength="3" autocomplete="off">
            </div>
        </div>
    </div>

    <div id="disconnect-modal" class="modal-overlay" style="z-index: 9999; backdrop-filter: blur(5px);">
        <div class="modal-content glass" style="text-align: center; padding: 40px 30px; gap: 15px;">
            <div style="display: flex; justify-content: center; margin-bottom: 10px;">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="var(--red)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
            </div>
            <div class="modal-header" style="color: var(--red); font-size: 28px; letter-spacing: 2px;">连接断开</div>
            <div style="color: rgba(255,255,255,0.7); font-size: 15px; margin: 10px 0 20px 0; line-height: 1.5;">
                与服务器的通信连接已意外中断，<br>可能是因为长时间未操作。<br>请刷新页面以重新连接。
            </div>
            <div class="form-row" style="justify-content: center;">
                <button class="primary" style="padding: 12px 40px; font-size: 18px; border-radius: 30px; box-shadow: 0 4px 15px rgba(238,50,51,0.4);" onclick="location.reload()">刷新页面</button>
            </div>
        </div>
    </div>

    <!-- Chat Widget -->
    <div id="chat-widget" class="glass">
        <button id="chat-toggle-btn" onclick="toggleChat()">💬<div class="chat-badge" id="chat-badge"></div></button>
        <div style="font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px;">房间聊天</div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="输入消息..." onkeypress="if(event.key==='Enter') sendChat()">
            <button class="primary" onclick="sendChat()">发送</button>
        </div>
    </div>

    <!-- Debug HUD -->
    <div id="debug-hud" class="glass">
        <p>Time: <span id="debug-time"></span></p>
        <p>WS: <span id="debug-ws">Disconnected</span></p>
        <p>Room: <span id="debug-room">None</span></p>
        <p>State: <span id="debug-state">-</span></p>
        <p>Players/Bots: <span id="debug-players">0/0</span></p>
    </div>

    <div id="toast-container"></div>

    <script>
        // Utilities & SVG Icons
        const SVGS = {
            'skip': `<svg class="card-icon" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" stroke="currentColor" stroke-width="12" fill="none"/><line x1="22" y1="22" x2="78" y2="78" stroke="currentColor" stroke-width="12"/></svg>`,
            'reverse': `<svg class="card-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 14V9a4 4 0 0 1 4-4h14"/><path d="m17 1 4 4-4 4m4 1v5a4 4 0 0 1-4 4H3"/><path d="m7 23-4-4 4-4"/></svg>`,
            '+2': `<svg class="card-icon" viewBox="0 0 100 100"><text x="50" y="70" font-size="60" font-family="Arial" font-weight="900" fill="currentColor" text-anchor="middle">+2</text></svg>`,
            'wild': `<svg class="card-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100"><g transform="translate(50 50)scale(.625)" stroke="#fff" stroke-width="3"><rect x="-35" y="-55" width="70" height="110" rx="8" fill="#d72600" transform="rotate(-40 20.606 -7.5)"/><rect x="-35" y="-55" width="70" height="110" rx="8" fill="#05a" transform="rotate(-15 18.99 -2.5)"/><rect x="-35" y="-55" width="70" height="110" rx="8" fill="#0a0" transform="rotate(10 28.575 2.5)"/><rect x="-35" y="-55" width="70" height="110" rx="8" fill="#fa0" transform="rotate(35 23.787 7.5)"/></g></svg>`,
            '+4': `<svg class="card-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100"><g transform="translate(50 50)scale(.625)"><rect x="-35" y="-55" width="70" height="110" rx="8" fill="#d72600" stroke="#fff" stroke-width="3" transform="rotate(-40 20.606 -7.5)"/><rect x="-35" y="-55" width="70" height="110" rx="8" fill="#05a" stroke="#fff" stroke-width="3" transform="rotate(-15 18.99 -2.5)"/><rect x="-35" y="-55" width="70" height="110" rx="8" fill="#0a0" stroke="#fff" stroke-width="3" transform="rotate(10 28.575 2.5)"/><rect x="-35" y="-55" width="70" height="110" rx="8" fill="#fa0" stroke="#fff" stroke-width="3" transform="rotate(35 23.787 7.5)"/><text y="28" fill="none" font-size="80" font-family="Arial Black, Impact, sans-serif" font-weight="bold" text-anchor="middle" stroke="#1a1a1a" stroke-width="12" stroke-linejoin="round">+4</text><text y="28" fill="#fff" font-size="80" font-family="Arial Black, Impact, sans-serif" font-weight="bold" text-anchor="middle">+4</text></g></svg>`
        };

        function getCardHTML(card) {
            if(!card) return '';
            const cClass = card.color;
            let center = `<div style="z-index:1;">${card.type}</div>`;
            if (SVGS[card.type]) {
                center = SVGS[card.type];
            }
            return `<div class="card ${cClass}" data-id="${card.id}" data-color="${card.color}" data-type="${card.type}">
                        ${center}
                    </div>`;
        }

        function showToast(msg, type = 'error') {
            const t = document.createElement('div');
            t.className = 'toast ' + type;
            t.innerText = msg;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        let publicRoomsInterval = null;
        let lastPublicRoomsHtml = '';

        function $(id) { return document.getElementById(id); }
        function showModal(id) { 
            $(id).classList.add('active'); 
            if (id === 'join-room-modal') {
                lastPublicRoomsHtml = ''; // Reset diff cache on open
                $('public-rooms-list').innerHTML = '<div style="text-align:center; color:rgba(255,255,255,0.5); font-size:14px;">正在加载...</div>';
                sendWS('get_public_rooms');
                if (publicRoomsInterval) clearInterval(publicRoomsInterval);
                publicRoomsInterval = setInterval(() => {
                    if ($('join-room-modal').classList.contains('active')) {
                        sendWS('get_public_rooms');
                    } else {
                        clearInterval(publicRoomsInterval);
                        publicRoomsInterval = null;
                    }
                }, 4000);
            }
        }
        function hideModal(id) { 
            $(id).classList.remove('active'); 
            if (id === 'join-room-modal' && publicRoomsInterval) {
                clearInterval(publicRoomsInterval);
                publicRoomsInterval = null;
            }
        }
        function switchView(id) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            $(id).classList.add('active');
            if(id === 'lobby-view' || id === 'game-view') {
                $('chat-widget').style.display = 'flex';
            } else {
                $('chat-widget').style.display = 'none';
            }
        }

        // State
        let ws;
        let myId = null;
        let currentRoom = null;
        let myHand = [];
        let isMyTurn = false;
        let pendingWildCardId = null;
        let isFirstRound = true;
        let serverTimeOffset = 0; // ms difference between client and server
        let lastUrgeTime = 0;
        let hasDrawnThisTurn = false; // Sync from server or local tracking
        let myDrawnCardsQueue = []; // Queue of actual cards drawn to show in animation
        let animatingPlayCard = null; // Store topCard temporarily while animation is running
        let isCheatMode = false;
        let isPendingCheatColor = false;
        let isSpectator = false;
        let spectatorTargetId = null;
        
        // Cheat Mode Activation
        let cheatClicks = 0;
        let cheatClickTimer = null;
        $('copyright-footer').addEventListener('click', () => {
            cheatClicks++;
            if (cheatClickTimer) clearTimeout(cheatClickTimer);
            
            if (cheatClicks >= 10) {
                if (!isCheatMode) {
                    isCheatMode = true;
                    // We send cheat_activated to server. If user is in a room it logs there,
                    // if not, server will handle it globally.
                    if (ws && ws.readyState === 1) {
                        sendWS('cheat_activated', { name: $('join-name').value.trim() || $('create-name').value.trim() });
                    }
                }
                cheatClicks = 0;    
                // No visual feedback as requested
            } else {
                cheatClickTimer = setTimeout(() => {
                    cheatClicks = 0;
                }, 2000);
            }
        });

        // Init
        const cachedName = localStorage.getItem('uno_player_name') || '';
        $('create-name').value = cachedName;
        $('join-name').value = cachedName;

        // Debug HUD loop
        setInterval(() => {
            const now = new Date(Date.now() + serverTimeOffset);
            $('debug-time').innerText = now.toTimeString().split(' ')[0] + '.' + String(now.getMilliseconds()).padStart(3, '0');
            $('debug-ws').innerText = ws ? (ws.readyState === 1 ? 'Connected' : 'Disconnected') : 'None';
            if (currentRoom) {
                $('debug-room').innerText = currentRoom.id;
                $('debug-state').innerText = currentRoom.state;
                const bots = currentRoom.players.filter(p => p.isBot).length;
                const humans = currentRoom.players.length - bots;
                $('debug-players').innerText = `${humans}/${bots} (Max:${currentRoom.maxPlayers})`;
            } else {
                $('debug-room').innerText = 'None';
                $('debug-state').innerText = '-';
                $('debug-players').innerText = '0/0';
            }
        }, 100);

        // WS Connect
        function connectWS() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
            ws.onopen = () => {
                console.log("WS Connected");
                // Sync time
                sendWS('ping');
                setInterval(() => {
                    sendWS('ping');
                }, 10000);
            };
            ws.onclose = () => {
                showModal('disconnect-modal');
            };
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                handleWSEvent(data);
            };
        }
        connectWS();

        function sendWS(type, payload = {}) {
            if (ws && ws.readyState === 1) {
                ws.send(JSON.stringify({ type, ...payload }));
            }
        }

        // Logic Input limit
        function changeNumber(id, delta, min, max) {
            const el = $(id);
            let val = parseInt(el.value) + delta;
            if (val < min) val = min;
            if (val > max) val = max;
            el.value = val;

            if (id === 'create-max') {
                const maxBots = val - 1;
                const botEl = $('create-bots');
                if (parseInt(botEl.value) > maxBots) {
                    botEl.value = maxBots;
                }
            } else if (id === 'create-bots') {
                const maxBots = parseInt($('create-max').value) - 1;
                if (val > maxBots) el.value = maxBots;
            }
        }

        function createRoom() {
            const name = $('create-name').value.trim();
            if (!name) { showToast('请输入昵称', 'error'); return; }
            localStorage.setItem('uno_player_name', name);
            const maxPlayers = parseInt($('create-max').value);
            const bots = parseInt($('create-bots').value);
            const hidden = $('create-hidden').checked;
            sendWS('create_room', { name, maxPlayers, bots, hidden });
            hideModal('create-room-modal');
        }

        function joinRoom(roomIdOverride) {
            const name = $('join-name').value.trim();
            if (!name) { showToast('请输入昵称', 'error'); return; }
            localStorage.setItem('uno_player_name', name);
            const roomId = roomIdOverride || $('join-room-input').value.trim();
            if (!roomId) { showToast('请输入房间号', 'error'); return; }
            sendWS('join_room', { name, roomId });
            // Remove hideModal from here, wait for server confirmation
        }

        function leaveRoom() {
            sendWS('leave_room');
            currentRoom = null;
            switchView('home-view');
        }

        function toggleReady() {
            if (currentRoom && currentRoom.state === 'lobby') {
                const me = currentRoom.players.find(p => p.id === myId);
                if (me) {
                    sendWS('ready', { state: !me.ready });
                    $('btn-ready').innerText = '请稍候...';
                }
            }
        }

        function startGame() {
            sendWS('start_game');
        }

        function copyRoomId() {
            navigator.clipboard.writeText(currentRoom.id);
            showToast('房间号已复制', 'success');
        }
        function copyLink() {
            const url = `${window.location.origin}/${currentRoom.id}`;
            navigator.clipboard.writeText(url);
            showToast('邀请链接已复制', 'success');
        }

        // Handlers
        function handleWSEvent(data) {
            switch(data.type) {
                case 'pong':
                    serverTimeOffset = data.serverTime - Date.now();
                    break;
                case 'public_rooms_list':
                    renderPublicRooms(data.rooms);
                    break;
                case 'error':
                    showToast(data.message, 'error');
                    if (data.message === '房间已解散') {
                        currentRoom = null;
                        isSpectator = false;
                        spectatorTargetId = null;
                        switchView('home-view');
                    }
                    break;
                case 'room_state':
                    const prevState = currentRoom ? currentRoom.state : null;
                    currentRoom = data.room;
                    myHand = data.myHand || myHand;
                    myId = data.myId || myId;
                    hasDrawnThisTurn = data.hasDrawnThisTurn || false;
                    isSpectator = data.isSpectator || false;
                    spectatorTargetId = data.spectatorTargetId || null;
                    // If we successfully get a room state and we are still showing join modal, hide it
                    if ($('join-room-modal').classList.contains('active')) {
                        hideModal('join-room-modal');
                    }
                    renderRoom(prevState);
                    break;
                case 'chat':
                    appendChat(data.sender, data.message, data.isSpectator);
                    break;
                case 'draw_card_result':
                    if (data.cards) {
                        myDrawnCardsQueue.push(...data.cards);
                    }
                    break;
                case 'draw_card':
                    // We wait a bit longer (100ms) to ensure both draw_card_result and room_state
                    // have been fully processed and the DOM is actually updated.
                    setTimeout(() => animateDrawCard(data.playerId, data.count), 100);
                    break;
                case 'play_card':
                    animatePlayCard(data.playerId, data.card, data.declaredColor);
                    break;
                case 'reshuffle':
                    showToast('牌堆耗尽，正在重新洗牌...', 'info');
                    break;
                // Play Urge Sound
                case 'urged':
                    document.body.style.animation = 'shake 0.5s';
                    setTimeout(()=>document.body.style.animation='', 500);
                    showToast('有人催促你快点出牌！', 'info');
                    playUrgeSound();
                    break;
                case 'qte_start':
                    $('qte-word-display').innerText = `UNO-${data.qteWord}`;
                    if (isSpectator) {
                        $('qte-input-wrapper').style.display = 'none';
                    } else {
                        $('qte-input-wrapper').style.display = 'flex';
                        $('qte-input').value = '';
                    }
                    showModal('qte-modal');
                    if (!isSpectator) $('qte-input').focus();
                    break;
                case 'qte_end':
                    hideModal('qte-modal');
                    showToast(`被 ${data.caughtBy} 抓到了！`, 'info');
                    break;
                case 'qte_win':
                    hideModal('qte-modal');
                    break;
                case 'cheat_need_color':
                    // Server detected an unplayable card but cheat mode is ON.
                    // Ask user to pick a color for their new +4 card.
                    pendingWildCardId = data.cardId;
                    isPendingCheatColor = true;
                    showModal('color-picker-modal');
                    break;
            }
        }

        // Add shake animation dynamic
        const style = document.createElement('style');
        style.innerHTML = `@keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 10% { transform: translate(-1px, -2px) rotate(-1deg); } 20% { transform: translate(-3px, 0px) rotate(1deg); } 30% { transform: translate(3px, 2px) rotate(0deg); } 40% { transform: translate(1px, -1px) rotate(1deg); } 50% { transform: translate(-1px, 2px) rotate(-1deg); } 60% { transform: translate(-3px, 1px) rotate(0deg); } 70% { transform: translate(3px, 1px) rotate(-1deg); } 80% { transform: translate(-1px, -1px) rotate(1deg); } 90% { transform: translate(1px, 2px) rotate(0deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); } }`;
        document.head.appendChild(style);

        function renderPublicRooms(rooms) {
            const listEl = $('public-rooms-list');
            let newHtml = '';
            
            if (rooms.length === 0) {
                newHtml = '<div style="text-align:center; color:rgba(255,255,255,0.5); font-size:14px; padding: 10px;">目前无非隐藏房间</div>';
            } else {
                newHtml = rooms.map(r => `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: background 0.2s;" 
                         onmouseover="this.style.background='rgba(255,255,255,0.1)'" 
                         onmouseout="this.style.background='transparent'"
                         onclick="joinRoom('${r.id}')">
                        <div>
                            <div style="font-weight:bold; color:var(--yellow);">${r.id}</div>
                            <div style="font-size:12px; color:rgba(255,255,255,0.6);">${r.state === 'lobby' ? '等待中' : '游戏中'}</div>
                        </div>
                        <div style="font-size:14px;">${r.playersCount}/${r.maxPlayers} 人</div>
                    </div>
                `).join('');
            }
            
            if (lastPublicRoomsHtml !== newHtml) {
                listEl.innerHTML = newHtml;
                lastPublicRoomsHtml = newHtml;
            }
        }

        function renderRoom(prevState) {
            if (!currentRoom) return;
            
            if (currentRoom.state === 'lobby') {
                let me = null;
                if (isSpectator) {
                    me = currentRoom.spectators ? currentRoom.spectators.find(s => s.id === myId) : null;
                } else {
                    me = currentRoom.players.find(p => p.id === myId);
                }
                const isHost = me && me.isHost && !isSpectator;
                const needsResultView = me && !me.hasSeenResults && currentRoom.results;

                const updateLobbyDOM = () => {
                    $('lobby-room-id').innerText = currentRoom.id;
                    let playersHtml = '';
                    for (let i = 0; i < currentRoom.maxPlayers; i++) {
                        const p = currentRoom.players[i];
                        if (p) {
                            let statusText = p.ready ? '已准备' : '未准备';
                            let statusColor = p.ready ? 'var(--green)' : 'var(--red)';
                            if (currentRoom.results && !p.hasSeenResults && !p.isBot) {
                                statusText = '结算中';
                                statusColor = 'var(--yellow)';
                            }

                            playersHtml += `
                                <div class="player-item glass-no-shadow ${p.id === myId ? 'me' : ''}">
                                    <div style="display:flex; align-items:center; justify-content:center; width:100%;">
                                        <span style="font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:60%;">${p.name}</span>
                                        ${p.isHost ? '<span style="color:var(--yellow);font-size:12px;margin-left:5px;flex-shrink:0;">[房主]</span>' : ''}
                                        ${p.isBot ? '<span style="color:var(--blue);font-size:12px;margin-left:5px;flex-shrink:0;">[AI]</span>' : ''}
                                    </div>
                                    <div style="display:flex; flex-direction:column; align-items:center; gap:5px; margin-top: auto;">
                                        <span class="player-status-text" style="color:${statusColor}; transform: scale(${p.ready ? 1.1 : 1});">${statusText}</span>
                                        ${(isHost && p.id !== myId) ? `<button class="kick-btn" onclick="kickPlayer('${p.id}')">踢出</button>` : ''}
                                    </div>
                                </div>
                            `;
                        } else {
                            playersHtml += `
                                <div class="player-item empty glass-no-shadow">
                                    <div style="font-size: 14px; letter-spacing: 2px;">等待加入...</div>
                                </div>
                            `;
                        }
                    }
                    $('lobby-players').innerHTML = playersHtml;

                    if (me && me.ready) {
                        $('btn-ready').innerText = '取消准备';
                        $('btn-ready').classList.remove('primary');
                    } else {
                        $('btn-ready').innerText = '准备';
                        $('btn-ready').classList.add('primary');
                    }

                    if (isHost) {
                        $('btn-start').style.display = 'block';
                        const allReady = currentRoom.players.every(p => p.ready);
                        const canStart = currentRoom.players.length >= 2 && allReady;
                        $('btn-start').disabled = !canStart;
                    } else {
                        $('btn-start').style.display = 'none';
                    }
                };

                const updateResultDOM = () => {
                    const res = currentRoom.results;
                    if (!res) return;
                    $('winner-name').innerText = res[0].name;
                    let listHtml = '';
                    for(let i=1; i<res.length; i++) {
                        listHtml += `<div class="lb-row"><span class="lb-rank">${i+1}</span><span class="lb-name">${res[i].name}</span><span class="lb-cards">${res[i].handCount}张</span></div>`;
                    }
                    $('result-leaderboard').innerHTML = listHtml;
                    $('btn-result-continue').style.display = 'block';
                    if (isSpectator) {
                        $('btn-result-leave').innerText = '离开房间';
                        $('btn-result-continue').innerText = '加入房间';
                    } else {
                        $('btn-result-leave').innerText = '离开房间';
                        $('btn-result-continue').innerText = '继续游戏';
                    }
                };

                if (needsResultView) {
                    if (prevState === 'ingame' || prevState === 'qte' || (isSpectator && prevState === null && currentRoom.results)) {
                        if (!window.isTransitioningToResult) {
                            window.isTransitioningToResult = true;
                            hideModal('qte-modal');
                            
                            // Show Victory Overlay Animation
                            const overlay = document.createElement('div');
                            overlay.style.cssText = 'position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.85); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; opacity:0; transition:opacity 0.5s; color:var(--yellow); font-size:36px; font-weight:bold; text-shadow:0 0 20px rgba(255,215,0,0.5); pointer-events:none;';
                            const winner = currentRoom.results[0];
                            overlay.innerHTML = `<div id="victory-crown" style="font-size:80px; margin-bottom:20px; transform:scale(0); animation:popIn 0.5s 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; position: relative;">🏆</div><div id="victory-text" style="opacity:0; transform:translateY(20px); animation:slideUpFade 0.5s 0.4s forwards; text-align:center; padding: 0 20px;"><div style="font-size: 48px; margin-bottom: 10px; word-break: break-all;">${winner.name}</div><div style="font-size: 24px; opacity: 0.8;">获得了游戏的胜利</div></div>`;
                            document.body.appendChild(overlay);
                            
                            overlay.getBoundingClientRect();
                            overlay.style.opacity = '1';

                            setTimeout(() => {
                                // Start fading out the overlay
                                overlay.style.opacity = '0';
                                
                                // While overlay fades out, render the result view underneath so it "appears"
                                // The overlay has z-index 9999 so it covers the transition
                                window.isTransitioningToResult = false;
                                if (currentRoom) {
                                    switchView('result-view');
                                    updateResultDOM();
                                    updateLobbyDOM();
                                }
                                
                                setTimeout(() => {
                                    if(document.body.contains(overlay)) overlay.remove();
                                }, 500);
                            }, 3000);
                        } else {
                            updateLobbyDOM();
                        }
                    } else {
                        if ($('result-view').className.indexOf('active') === -1 && !window.isTransitioningToResult) {
                            switchView('result-view');
                        }
                        updateResultDOM();
                        updateLobbyDOM();
                    }
                } else {
                    updateLobbyDOM();
                    if ($('lobby-view').className.indexOf('active') === -1 && !window.isTransitioningToResult) {
                        switchView('lobby-view');
                        isFirstRound = true;
                    }
                }

            } else if (currentRoom.state === 'ingame') {
                if ($('game-view').className.indexOf('active') === -1) switchView('game-view');

                $('game-room-id').innerText = currentRoom.id;
                
                const btnLeaveGame = document.querySelector('.btn-leave-game');
                if (isSpectator) {
                    btnLeaveGame.innerText = '退出观战';
                } else {
                    btnLeaveGame.innerText = '退出游戏';
                }
                
                const currentPlayer = currentRoom.players[currentRoom.turnIndex];
                isMyTurn = currentPlayer && currentPlayer.id === myId;
                
                if (isMyTurn && !isSpectator) {
                    $('turn-indicator').classList.add('active');
                    $('turn-indicator').innerText = '轮到你了!';
                    if (isFirstRound) {
                        $('guide-draw').classList.add('show');
                    }
                } else {
                    $('turn-indicator').classList.remove('active');
                    $('turn-indicator').innerText = `当前出牌: ${currentPlayer ? currentPlayer.name : ''}`;
                    $('guide-draw').classList.remove('show');
                }
                $('direction-indicator').innerText = `方向: ${currentRoom.direction === 1 ? '>>>右>>>' : '<<<左<<<'}`;

                // Render all players (including me)
                const allPlayers = [...currentRoom.players];
                // Move "me" to the first or let it be sorted naturally? Let's keep natural order but me is highlighted
                $('game-players').innerHTML = allPlayers.map(p => {
                    const isActive = p.id === (currentPlayer ? currentPlayer.id : null);
                    let handHtml = '';
                    const maxDisplay = Math.min(p.handCount, 15);
                    const isMobile = window.innerWidth <= 600;
                    const cardWidth = isMobile ? 25 : 40; // Match width of gpc-card-back
                    const containerWidth = isMobile ? 68 : 100; // Match usable width of player box
                    const step = maxDisplay > 1 ? Math.min(10, (containerWidth - cardWidth) / (maxDisplay - 1)) : 0;
                    const startLeft = (containerWidth - (cardWidth + (maxDisplay - 1) * step)) / 2;

                    for(let i=0; i<maxDisplay; i++) {
                        handHtml += `<div class="gpc-card-back" style="left: ${startLeft + i * step}px; z-index: ${i}"></div>`;
                    }
                    return `
                        <div class="game-player-card ${isActive ? 'active-turn' : ''} ${p.id === myId || (isSpectator && p.id === spectatorTargetId) ? 'me' : ''}" id="player-hud-${p.id}" ${isSpectator ? `onclick="changeSpectatorTarget('${p.id}')" style="cursor:pointer;"` : ''}>
                            <div style="display:flex; align-items:center; justify-content:center; width:100%;">
                                <span style="font-weight:bold; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:${p.isBot ? '70%' : '100%'};">${p.name}</span>
                                ${p.isBot ? '<span style="background:rgba(255,255,255,0.1); font-size:10px; padding:2px 4px; border-radius:10px; margin-left:4px; flex-shrink:0;">AI</span>' : ''}
                            </div>
                            <div class="gpc-hand">${handHtml}</div>
                        </div>
                    `;
                }).join('');

                // Auto scroll to active player
                setTimeout(() => {
                    const activePlayerEl = document.querySelector('.game-player-card.active-turn');
                    if (activePlayerEl) {
                        activePlayerEl.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                    }
                }, 100);

                // Render center
                // If a play animation is running, wait until it finishes to update discard pile
                if (animatingPlayCard && currentRoom.topCard && currentRoom.topCard.id === animatingPlayCard.id) {
                    // We are currently animating this card, so DO NOT update the discard pile yet.
                    // We will update it in the onComplete callback of the animation.
                } else if (currentRoom.topCard) {
                    const colorClass = currentRoom.topCard.color === 'black' ? currentRoom.currentColor : currentRoom.topCard.color;
                    const visualCard = {...currentRoom.topCard, color: colorClass};
                    const html = getCardHTML(visualCard);
                    // Inject discard-card class
                    $('discard-pile').innerHTML = html.replace('class="card ', 'class="card discard-card ');
                    $('discard-pile').style.boxShadow = 'none';
                } else {
                    $('discard-pile').innerHTML = '';
                    $('discard-pile').style.boxShadow = 'none';
                }

                // Render my hand
                const handWidth = $('my-hand').clientWidth;
                const cardWidth = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-w'));
                const availableSpace = handWidth - cardWidth;
                
                let step = cardWidth + 10; // normal gap
                if (myHand.length > 1) {
                    const neededSpace = (myHand.length - 1) * step;
                    if (neededSpace > availableSpace) {
                        step = availableSpace / (myHand.length - 1);
                    }
                }
                
                const totalWidth = (myHand.length - 1) * step + cardWidth;
                let startLeft = (handWidth - totalWidth) / 2;

                $('my-hand').innerHTML = myHand.map((c, i) => {
                    const leftPos = startLeft + (i * step);
                    // If this card is currently being animated (in queue), we make it invisible initially
                    // but it still takes up layout space. Wait, queue is consumed during animation.
                    // Better: check if it's the last card and we just triggered draw
                    const isAnimating = (i >= myHand.length - myDrawnCardsQueue.length);
                    const style = `left: ${leftPos}px; z-index: ${i}; opacity: ${isAnimating ? 0 : 1};`;
                    return `<div class="hand-card" style="${style}" onclick="tryPlayCard('${c.id}')">${getCardHTML(c)}</div>`;
                }).join('');

                // Action buttons
                $('btn-skip').classList.remove('show');
                $('btn-urge').classList.remove('show');
                if (isMyTurn && !isSpectator) {
                    if (hasDrawnThisTurn) {
                        $('btn-skip').classList.add('show');
                    }
                } else if (!isSpectator) {
                    $('btn-urge').classList.add('show');
                }
            }
        }

        // Game Actions
        function changeSpectatorTarget(targetId) {
            if (!isSpectator || targetId === spectatorTargetId) return;
            sendWS('change_spectator_target', { targetId });
        }
        
        function kickPlayer(id) { sendWS('kick_player', { targetId: id }); }
        
        function drawCard() {
            if (!isMyTurn || isSpectator) return;
            sendWS('draw_card');
            $('guide-draw').classList.remove('show');
            isFirstRound = false;
        }

        function skipTurn() {
            if (isSpectator) return;
            sendWS('skip_turn');
            $('guide-draw').classList.remove('show');
            isFirstRound = false;
        }

        let urgeCooldownTimer = null;
        function urgeTurn() {
            if (isSpectator) return;
            const now = Date.now();
            
            if (!isCheatMode) {
                if (now - lastUrgeTime < 2000) {
                    showToast(`催促太频繁啦，请等待 ${Math.ceil((2000 - (now - lastUrgeTime)) / 1000)} 秒`, 'error');
                    return;
                }
                lastUrgeTime = now;
                sendWS('urge');

                const btn = $('btn-urge');
                btn.disabled = true;
                let timeLeft = 2;
                btn.innerText = `催促(${timeLeft}s)`;
                
                if (urgeCooldownTimer) clearInterval(urgeCooldownTimer);
                urgeCooldownTimer = setInterval(() => {
                    timeLeft--;
                    if (timeLeft <= 0) {
                        clearInterval(urgeCooldownTimer);
                        btn.disabled = false;
                        btn.innerText = '催促';
                    } else {
                        btn.innerText = `催促(${timeLeft}s)`;
                    }
                }, 1000);
            } else {
                // Cheat mode: no cooldown
                sendWS('urge');
                // Optional: brief animation to show click registration
                const btn = $('btn-urge');
                btn.style.transform = 'scale(0.9)';
                setTimeout(() => btn.style.transform = '', 100);
            }
        }

        // Web Audio API for short Urge beep
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playUrgeSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const t = audioCtx.currentTime;
            
            // First beep
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(587.33, t); // D5
            gain1.gain.setValueAtTime(0, t);
            gain1.gain.linearRampToValueAtTime(0.2, t + 0.05);
            gain1.gain.linearRampToValueAtTime(0, t + 0.15);
            osc1.connect(gain1).connect(audioCtx.destination);
            osc1.start(t);
            osc1.stop(t + 0.15);

            // Second beep
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(783.99, t + 0.15); // G5
            gain2.gain.setValueAtTime(0, t + 0.15);
            gain2.gain.linearRampToValueAtTime(0.2, t + 0.2);
            gain2.gain.linearRampToValueAtTime(0, t + 0.4);
            osc2.connect(gain2).connect(audioCtx.destination);
            osc2.start(t + 0.15);
            osc2.stop(t + 0.4);
        }

        function tryPlayCard(cardId) {
            if (!isMyTurn || isSpectator) return;
            $('guide-draw').classList.remove('show');
            isFirstRound = false;
            const card = myHand.find(c => c.id === cardId);
            
            // All logic is now handled by the server. 
            // We only show the color picker if the user clicked a black card naturally.
            if (card.color === 'black') {
                pendingWildCardId = cardId;
                showModal('color-picker-modal');
            } else {
                sendWS('play_card', { cardId, declaredColor: card.color, cheat: isCheatMode });
            }
        }

        function submitColor(color) {
            if (pendingWildCardId) {
                if (isPendingCheatColor) {
                    sendWS('play_cheat_card', { cardId: pendingWildCardId, declaredColor: color });
                    isPendingCheatColor = false;
                } else {
                    sendWS('play_card', { cardId: pendingWildCardId, declaredColor: color, cheat: isCheatMode });
                }
                pendingWildCardId = null;
            }
            hideModal('color-picker-modal');
        }

        function cancelColorPicker() {
            pendingWildCardId = null;
            isPendingCheatColor = false;
            hideModal('color-picker-modal');
        }

        function submitQte() {
            const val = $('qte-input').value.trim();
            if(val.length === 3) {
                sendWS('qte_submit', { word: `UNO-${val}` });
                $('qte-input').value = '';
            }
        }
        
        $('qte-input').addEventListener('input', function() {
            if (this.value.trim().length === 3) {
                submitQte();
            }
        });

        function returnLobby() {
            window.isTransitioningToResult = false;
            // Let the server know this player has finished reviewing results
            sendWS('return_lobby');
            switchView('lobby-view');
        }

        // Animations
        function getActualCardSize() {
            const isMobile = window.innerWidth <= 600;
            return {
                width: isMobile ? 60 : (parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-w')) || 100),
                height: isMobile ? 90 : (parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-h')) || 150)
            };
        }

        function animateCard(startRect, endRect, cardHtml, onComplete, fadeOutAtEnd = false) {
            const el = document.createElement('div');
            el.className = 'anim-card';
            
            // To prevent internal content from squishing, we maintain a strict aspect ratio wrapper
            // and use transform scale to handle resizing. We wrap the cardHtml in an inner div.
            const cardSize = getActualCardSize();
            el.innerHTML = `<div class="anim-card-inner" style="width:${cardSize.width}px; height:${cardSize.height}px;">${cardHtml}</div>`;
            
            // Set initial position
            el.style.left = startRect.left + 'px';
            el.style.top = startRect.top + 'px';
            el.style.width = startRect.width + 'px';
            el.style.height = startRect.height + 'px';
            el.style.opacity = '1';

            const innerEl = el.querySelector('.anim-card-inner');
            
            // Calculate starting scale based on actual standard card size
            const startScaleX = startRect.width / cardSize.width;
            const startScaleY = startRect.height / cardSize.height;
            innerEl.style.transform = `scale(${startScaleX}, ${startScaleY})`;

            document.body.appendChild(el);

            // Force reflow
            el.getBoundingClientRect();

            // Animate wrapper position/size
            el.style.transition = 'left 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), top 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), height 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.2s ease-out';
            el.style.left = endRect.left + 'px';
            el.style.top = endRect.top + 'px';
            el.style.width = endRect.width + 'px';
            el.style.height = endRect.height + 'px';
            
            // Animate inner scale
            const endScaleX = endRect.width / cardSize.width;
            const endScaleY = endRect.height / cardSize.height;
            innerEl.style.transform = `scale(${endScaleX}, ${endScaleY})`;
            
            if (fadeOutAtEnd) {
                // Start fading out near the end of the flight (e.g. at 200ms of the 400ms journey)
                setTimeout(() => {
                    el.style.opacity = '0';
                }, 200);
            }

            setTimeout(() => {
                el.remove();
                if(onComplete) onComplete();
                // Show the real card in DOM immediately after animation element is removed
                // Only if no custom onComplete handles it (which draw card does now)
                if (!onComplete) {
                    const myCardEls = document.querySelectorAll('.hand-card');
                    myCardEls.forEach(card => {
                        if (card.style.opacity === '0') card.style.opacity = '1';
                    });
                }
            }, 400); // Wait exactly for the 400ms transition to finish
        }

        function animateDrawCard(playerId, count) {
            const deckEl = $('deck-pile');
            if(!deckEl) return;
            const startRect = deckEl.getBoundingClientRect();
