            let endEl = null;
            let isMe = (playerId === myId);
            if (isMe) {
                endEl = $('my-hand');
            } else {
                endEl = $(`player-hud-${playerId}`);
            }
            
            if(!endEl) return;
            let endRect = endEl.getBoundingClientRect();

            // We use a global animation queue counter to prevent overlap if multiple players draw
            // But usually this function is called once per event.
            for(let i=0; i<count; i++) {
                setTimeout(() => {
                    let cardHtml = `<div class="card card-back" style="width:100%;height:100%;"></div>`;
                    let currentEndRect = endRect;

                    if (isMe && myDrawnCardsQueue.length > 0) {
                        const drawnCard = myDrawnCardsQueue.shift();
                        cardHtml = getCardHTML(drawnCard);

                        // Calculate precise end target for 'me' based on new hand size
                        const handRect = $('my-hand').getBoundingClientRect();
                        const handWidth = handRect.width;
                        const cardSize = getActualCardSize();
                        const cardWidth = cardSize.width;
                        const availableSpace = handWidth - cardWidth;
                        
                        // Because room_state is already processed, myHand.length already includes this new card.
                        const newHandLength = myHand.length;
                        let step = cardWidth + 10;
                        if (newHandLength > 1) {
                            const neededSpace = (newHandLength - 1) * step;
                            if (neededSpace > availableSpace) {
                                step = availableSpace / (newHandLength - 1);
                            }
                        }
                        
                        const totalWidth = (newHandLength - 1) * step + cardWidth;
                        const startLeft = (handWidth - totalWidth) / 2;
                        
                        // Position for the card currently being animated
                        const cardIndex = newHandLength - count + i;
                        const leftPos = startLeft + (cardIndex * step);
                        
                        // Overwrite endRect to be the exact pixel coordinate in my-hand
                        currentEndRect = {
                            left: handRect.left + leftPos,
                            top: handRect.top,
                            width: cardWidth,
                            height: cardSize.height
                        };
                    } else if (!isMe) {
                        // For other players, end rect is just the center of their player-hud
                        // but we need to keep card proportions
                        const cardSize = getActualCardSize();
                        // Target size for opponent is smaller
                        const targetWidth = cardSize.width * 0.5;
                        const targetHeight = cardSize.height * 0.5;
                        const hudRect = endRect;
                        
                        currentEndRect = {
                            left: hudRect.left + (hudRect.width / 2) - (targetWidth / 2),
                            top: hudRect.top + (hudRect.height / 2) - (targetHeight / 2),
                            width: targetWidth,
                            height: targetHeight
                        };
                    }
                    
                    animateCard(startRect, currentEndRect, cardHtml, () => {
                        // When this specific card animation completes, reveal it in the DOM if it's 'me'
                        if (isMe) {
                            const cardIndex = myHand.length - count + i;
                            const targetCardEl = document.querySelector(`.hand-card[style*="z-index: ${cardIndex}"]`);
                            if (targetCardEl) {
                                targetCardEl.style.opacity = '1';
                            }
                        }
                    }, !isMe); // If not me, trigger fadeOutAtEnd
                }, i * 200); // 200ms stagger between each card flying out
            }
        }

        function animatePlayCard(playerId, card, declaredColor) {
            let startEl = null;
            let startRect = null;
            const isMe = (playerId === myId);

            if (isMe) {
                // Try to find the exact card in hand DOM before it's removed by renderRoom
                const myCardEl = document.querySelector(`.hand-card .card[data-id="${card.id}"]`);
                if (myCardEl) {
                    startEl = myCardEl.parentElement;
                } else {
                    startEl = $('my-hand');
                }
                startRect = startEl.getBoundingClientRect();
            } else {
                startEl = $(`player-hud-${playerId}`);
                const hudRect = startEl.getBoundingClientRect();
                const cardSize = getActualCardSize();
                const startWidth = cardSize.width * 0.5;
                const startHeight = cardSize.height * 0.5;
                
                // For other players, calculate a centered card-shaped rect based on their HUD
                startRect = {
                    left: hudRect.left + (hudRect.width / 2) - (startWidth / 2),
                    top: hudRect.top + (hudRect.height / 2) - (startHeight / 2),
                    width: startWidth,
                    height: startHeight
                };
            }
            
            const discardEl = $('discard-pile');
            if(!startEl || !discardEl) return;

            const endRect = discardEl.getBoundingClientRect();
            
            const visualCard = {...card, color: card.color==='black' ? declaredColor : card.color};
            
            // Mark this card as currently animating so renderRoom doesn't show it in discard pile yet
            animatingPlayCard = card;

            animateCard(startRect, endRect, getCardHTML(visualCard), () => {
                // Animation complete, now it's safe to show it on the discard pile
                animatingPlayCard = null;
                // Force a re-render to update the discard pile with the real topCard
                renderRoom();
            });
        }

        // Chat
        function toggleChat() {
            $('chat-widget').classList.toggle('open');
            if ($('chat-widget').classList.contains('open')) {
                $('chat-badge').classList.remove('show');
            }
        }
        
        // Close chat when clicking outside on mobile
        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 600) {
                const chatWidget = $('chat-widget');
                const chatBtn = $('chat-toggle-btn');
                if (chatWidget.classList.contains('open') && !chatWidget.contains(e.target) && !chatBtn.contains(e.target)) {
                    chatWidget.classList.remove('open');
                }
            }
        });

        function sendChat() {
            const val = $('chat-input').value.trim();
            if(val) {
                sendWS('chat', { message: val });
                $('chat-input').value = '';
            }
        }

        function appendChat(sender, msg, senderIsSpectator) {
            const isMe = sender === ($('join-name').value.trim() || $('create-name').value.trim());
            const msgHtml = `
                <div style="display:flex; flex-direction:column; align-items:${isMe ? 'flex-end' : 'flex-start'}">
                    <div class="chat-sender">${sender}${senderIsSpectator ? ' <span style="color:var(--yellow);font-size:8px;">[观战]</span>' : ''}</div>
                    <div class="chat-msg ${isMe ? 'me' : 'others'}">${msg}</div>
                </div>
            `;
            const box = $('chat-messages');
            box.innerHTML += msgHtml;
            box.scrollTop = box.scrollHeight;
            
            if (!$('chat-widget').classList.contains('open') && !isMe) {
                if (window.innerWidth > 600) {
                    $('chat-widget').classList.add('open');
                    $('chat-badge').classList.remove('show');
                } else {
                    $('chat-badge').classList.add('show');
                }
            }
        }

        // Direct Link routing
        window.onload = () => {
            const path = window.location.pathname.substring(1);
            if (path && path.length === 3 && !isNaN(path)) {
                $('join-room-input').value = path;
                showModal('join-room-modal');
                // Clean the URL without reloading the page
                window.history.replaceState({}, document.title, "/");
            }
        };

    </script>
</body>
</html>
